<!DOCTYPE html>
<html>
<head>
<title>The Smoke Club</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    margin:0;
}

header{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

.card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

button{
    background:green;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
    nav{
margin-top:20px;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
padding:10px 15px;
border-radius:6px;
background:#222;
transition:0.3s;
}

nav a:hover{
background:gold;
color:black;
}
</style>

</head>

<body>

<header>
  <h1>The Smoke Club</h1>
  <p>Premium Smoke • Vape • Perfume</p>

  <nav>
    <a href="#home">Home</a>
    <a href="#vapes">Vapes</a>
    <a href="#perfumes">Perfumes</a>
    <a href="#papers">Rolling Papers</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="card">
    <h2>Perfume</h2>
    <h3>₹499</h3>
    <button onclick="order('Perfume')">Order on WhatsApp</button>
</div>

<div class="card">
    <h2>Rolling Paper</h2>
    <h3>₹100</h3>
    <button onclick="order('Rolling Paper')">Order on WhatsApp</button>
</div>

<script>
function order(product){
    let number = "919900509974";
    let text = "Hello, I want to order " + product;
    let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(text);
    window.open(url, "_blank");
}
</script>

</body>
</html>
